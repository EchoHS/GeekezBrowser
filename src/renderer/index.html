<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>GeekEZ Browser</title>
    <style>
        :root {
            --transition-speed: 0.3s;
            --row-height: 24px;
            --glass-blur: 22px;
            --glass-saturation: 145%;
            --glass-radius: 12px;
            --control-glass-blur: 18px;
        }

        [data-theme="geek"] {
            --bg-color: #1e1e2d;
            --card-bg: rgba(43, 43, 64, 0.68);
            --text-primary: #ffffff;
            --text-secondary: #a0a0ba;
            --accent: #00e0ff;
            --danger: #f64e60;
            --border: #3f4254;
            --splash-bg: #000000;
            --splash-color: #00e0ff;
            --input-bg: rgba(18, 18, 31, 0.64);
            --bg-color-end: #10101b;
            --glass-border: rgba(75, 84, 104, 0.24);
            --glass-control-bg: rgba(18, 24, 38, 0.68);
            --glass-shadow: 0 18px 48px rgba(0, 0, 0, 0.36), inset 0 1px 0 rgba(65, 78, 98, 0.13);
            --glass-shadow-hover: 0 22px 54px rgba(0, 0, 0, 0.4), 0 0 22px rgba(0, 224, 255, 0.08);
            --ambient-primary: rgba(0, 224, 255, 0.14);
            --ambient-secondary: rgba(92, 72, 180, 0.16);
            --overlay-bg: rgba(5, 5, 12, 0.62);
            --surface-hover: rgba(255, 255, 255, 0.075);
            --tag-bg: rgba(255, 255, 255, 0.08);
            --tag-text: #d8d9e8;
            --tag-border: rgba(255, 255, 255, 0.12);
            --tech-line-primary: rgba(0, 224, 255, 0.075);
            --tech-line-secondary: rgba(117, 96, 210, 0.07);
            --button-neutral-shadow: rgba(0, 0, 0, 0.3);
            --button-highlight: rgba(68, 82, 103, 0.15);
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.66);
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #d63031;
            --danger: #e17055;
            --border: #dfe6e9;
            --splash-bg: #fff;
            --splash-color: #d63031;
            --input-bg: rgba(255, 255, 255, 0.58);
            --bg-color-end: #e5e9f0;
            --glass-border: rgba(255, 255, 255, 0.86);
            --glass-control-bg: rgba(255, 255, 255, 0.48);
            --glass-shadow: 0 18px 44px rgba(45, 55, 72, 0.13), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            --glass-shadow-hover: 0 22px 48px rgba(45, 55, 72, 0.18), 0 0 18px rgba(214, 48, 49, 0.08);
            --ambient-primary: rgba(255, 255, 255, 0.92);
            --ambient-secondary: rgba(214, 48, 49, 0.09);
            --overlay-bg: rgba(56, 62, 72, 0.3);
            --surface-hover: rgba(255, 255, 255, 0.64);
            --tag-bg: rgba(255, 255, 255, 0.72);
            --tag-text: #59636e;
            --tag-border: rgba(44, 62, 80, 0.12);
            --tech-line-primary: rgba(214, 48, 49, 0.055);
            --tech-line-secondary: rgba(185, 70, 85, 0.045);
            --button-neutral-shadow: rgba(45, 55, 72, 0.14);
            --button-highlight: rgba(255, 255, 255, 0.92);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: rgba(31, 32, 34, 0.7);
            --text-primary: #e0e0e0;
            --text-secondary: #757575;
            --accent: #66bb6a;
            --danger: #ef5350;
            --border: #333333;
            --splash-bg: #121212;
            --splash-color: #66bb6a;
            --input-bg: rgba(45, 46, 49, 0.64);
            --bg-color-end: #080909;
            --glass-border: rgba(73, 80, 75, 0.22);
            --glass-control-bg: rgba(12, 16, 13, 0.72);
            --glass-shadow: 0 18px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(69, 83, 72, 0.12);
            --glass-shadow-hover: 0 22px 54px rgba(0, 0, 0, 0.46), 0 0 20px rgba(102, 187, 106, 0.08);
            --ambient-primary: rgba(102, 187, 106, 0.06);
            --ambient-secondary: rgba(65, 74, 70, 0.1);
            --overlay-bg: rgba(0, 0, 0, 0.66);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --tag-bg: rgba(255, 255, 255, 0.075);
            --tag-text: #c2c5c8;
            --tag-border: rgba(255, 255, 255, 0.11);
            --tech-line-primary: rgba(102, 187, 106, 0.04);
            --tech-line-secondary: rgba(82, 105, 89, 0.035);
            --button-neutral-shadow: rgba(0, 0, 0, 0.34);
            --button-highlight: rgba(72, 87, 76, 0.16);
        }

        [data-theme="tech-gray"] {
            --bg-color: #eef8ff;
            --bg-color-end: #f7f5ff;
            --card-bg: rgba(255, 255, 255, 0.58);
            --text-primary: #1b2a40;
            --text-secondary: #68778d;
            --accent: #2f7cf6;
            --danger: #e64d6b;
            --border: rgba(255, 255, 255, 0.72);
            --splash-bg: #f2f8ff;
            --splash-color: #1b2a40;
            --input-bg: rgba(255, 255, 255, 0.56);
            --glass-border: rgba(255, 255, 255, 0.88);
            --glass-control-bg: rgba(255, 255, 255, 0.52);
            --glass-shadow: 0 12px 30px rgba(65, 113, 171, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.94);
            --glass-shadow-hover: 0 16px 38px rgba(65, 113, 171, 0.14), 0 0 0 1px rgba(255, 255, 255, 0.74);
            --ambient-primary: rgba(93, 190, 255, 0.16);
            --ambient-secondary: rgba(145, 113, 255, 0.12);
            --overlay-bg: rgba(58, 63, 70, 0.22);
            --surface-hover: rgba(255, 255, 255, 0.7);
            --glass-blur: 28px;
            --glass-radius: 18px;
            --tag-bg: rgba(255, 255, 255, 0.62);
            --tag-text: #68778b;
            --tag-border: rgba(255, 255, 255, 0.82);
            --tech-line-primary: rgba(54, 132, 245, 0.035);
            --tech-line-secondary: rgba(133, 99, 235, 0.03);
            --button-neutral-shadow: rgba(61, 98, 145, 0.11);
            --button-highlight: rgba(255, 255, 255, 0.96);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI', 'Microsoft YaHei UI', 'PingFang SC', sans-serif;
            padding: 20px;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 12% 5%, var(--ambient-primary) 0, transparent 38%),
                radial-gradient(circle at 88% 92%, var(--ambient-secondary) 0, transparent 42%),
                linear-gradient(145deg, var(--bg-color) 0%, var(--bg-color-end) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            overflow: hidden;
            transition: background var(--transition-speed), color var(--transition-speed);
            padding-top: 40px !important;
            -webkit-app-region: drag;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'kern' 1, 'ss01' 1;
            letter-spacing: -0.01em;
        }

        /* macOS 26+: let the native under-window material remain visible below the web UI. */
        html[data-native-glass="true"] {
            background: transparent;
        }

        html[data-native-glass="true"] body {
            background-color: transparent;
            background-image:
                radial-gradient(circle at 12% 5%, var(--ambient-primary) 0, transparent 38%),
                radial-gradient(circle at 88% 92%, var(--ambient-secondary) 0, transparent 42%),
                linear-gradient(145deg,
                    color-mix(in srgb, var(--bg-color) 74%, transparent) 0%,
                    color-mix(in srgb, var(--bg-color-end) 70%, transparent) 100%);
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background-image:
                linear-gradient(118deg, transparent 0 21%, var(--tech-line-primary) 21.15%, transparent 21.45% 100%),
                linear-gradient(146deg, transparent 0 66%, var(--tech-line-secondary) 66.15%, transparent 66.42% 100%),
                linear-gradient(72deg, transparent 0 82%, var(--tech-line-primary) 82.1%, transparent 82.3% 100%);
            opacity: 0.9;
            -webkit-mask-image: radial-gradient(ellipse at center, #000 0%, transparent 86%);
            mask-image: radial-gradient(ellipse at center, #000 0%, transparent 86%);
        }

        body::after {
            background-image:
                radial-gradient(ellipse 72% 54% at 8% 108%, transparent 0 67%, var(--tech-line-primary) 67.2%, transparent 67.55%),
                radial-gradient(ellipse 68% 48% at 104% -5%, transparent 0 72%, var(--tech-line-secondary) 72.2%, transparent 72.55%);
            opacity: 0.75;
        }

        #app {
            position: relative;
            z-index: 1;
        }

        button,
        input,
        textarea,
        select,
        .icon-btn,
        .profile-item,
        .modal-content,
        .lang-btn,
        .logo {
            -webkit-app-region: no-drag;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            margin-top: 0;
            padding: 3px 2px 11px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0;
            font-family: 'Courier New', monospace;
            transform: skewX(-10deg);
            cursor: default;
            user-select: none;
        }

        .logo-svg {
            height: 28px;
            width: auto;
            margin-right: -4px;
            position: relative;
            top: -2px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-primary);
            letter-spacing: -1px;
            display: flex;
            align-items: baseline;
        }

        .logo-text span.highlight {
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
            margin-left: 1px;
        }

        .logo-text span.ver {
            font-size: 12px;
            opacity: 0.6;
            font-weight: normal;
            margin-left: 6px;
            transform: skewX(10deg);
        }

        .running-badge {
            display: none;
            font-size: 10px;
            font-weight: bold;
            color: #27ae60;
            border: 1px solid #27ae60;
            background: rgba(39, 174, 96, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            text-transform: uppercase;
            animation: badgePulse 2s infinite;
            vertical-align: middle;
        }

        .running-badge.active {
            display: inline-block;
        }

        @keyframes badgePulse {
            50% {
                opacity: 1;
                box-shadow: 0 0 5px rgba(39, 174, 96, 0.5);
            }
        }

        input,
        textarea,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 12px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            outline: none;
        }

        button {
            padding: 0 12px;
            height: 30px;
            cursor: pointer;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--accent) 78%, white 22%) 0%,
                    color-mix(in srgb, var(--accent) 88%, transparent) 52%,
                    color-mix(in srgb, var(--accent) 78%, black 22%) 100%);
            color: var(--bg-color);
            border: 1px solid color-mix(in srgb, var(--accent) 64%, white 36%);
            border-radius: 8px;
            font-weight: 600;
            box-shadow:
                inset 0 1px 0 var(--button-highlight),
                inset 0 -1px 0 rgba(0, 0, 0, 0.16),
                0 7px 16px color-mix(in srgb, var(--accent) 22%, transparent),
                0 2px 5px var(--button-neutral-shadow);
            -webkit-backdrop-filter: blur(var(--control-glass-blur)) saturate(175%);
            backdrop-filter: blur(var(--control-glass-blur)) saturate(175%);
            transition: transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1),
                filter 0.18s ease,
                border-color 0.18s ease,
                box-shadow 0.18s ease,
                background-color 0.18s ease;
            text-transform: none;
            font-family: inherit;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            border-radius: inherit;
            background:
                radial-gradient(110% 95% at 16% -28%, rgba(255, 255, 255, 0.68), transparent 54%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 46%);
            opacity: 0.76;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.04) saturate(1.06);
            transform: translateY(-1px);
            border-color: color-mix(in srgb, var(--accent) 48%, white 52%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.88),
                inset 0 -1px 0 rgba(0, 0, 0, 0.12),
                0 10px 22px color-mix(in srgb, var(--accent) 28%, transparent),
                0 3px 7px var(--button-neutral-shadow);
        }

        button:active:not(:disabled) {
            transform: translateY(1px) scale(0.985);
            filter: brightness(0.98);
            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.18),
                inset 0 -1px 0 rgba(255, 255, 255, 0.32),
                0 2px 5px color-mix(in srgb, var(--accent) 16%, transparent);
            transition-duration: 0.07s;
        }

        button:focus-visible,
        .icon-btn:focus-visible,
        .lang-btn:focus-visible,
        .theme-select:focus-visible {
            outline: 2px solid color-mix(in srgb, var(--accent) 58%, transparent);
            outline-offset: 2px;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
            filter: saturate(0.7);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        button.outline {
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--glass-control-bg) 70%, white 30%),
                    color-mix(in srgb, var(--glass-control-bg) 84%, transparent));
            border: 1px solid color-mix(in srgb, var(--accent) 76%, transparent);
            color: var(--accent);
            box-shadow:
                inset 0 1px 0 var(--button-highlight),
                inset 0 -1px 0 color-mix(in srgb, var(--accent) 12%, transparent),
                0 6px 15px color-mix(in srgb, var(--accent) 10%, transparent),
                0 2px 5px color-mix(in srgb, var(--button-neutral-shadow) 72%, transparent);
        }

        button.outline:hover:not(:disabled) {
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--accent) 13%, white 87%),
                    color-mix(in srgb, var(--accent) 14%, var(--glass-control-bg)));
        }

        button.danger {
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--danger) 10%, var(--glass-control-bg)),
                    color-mix(in srgb, var(--danger) 5%, transparent));
            border: 1px solid color-mix(in srgb, var(--danger) 78%, transparent);
            color: var(--danger);
            box-shadow:
                inset 0 1px 0 var(--button-highlight),
                0 6px 15px color-mix(in srgb, var(--danger) 10%, transparent),
                0 2px 5px color-mix(in srgb, var(--button-neutral-shadow) 72%, transparent);
        }

        button.danger:hover:not(:disabled) {
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--danger) 78%, white 22%),
                    color-mix(in srgb, var(--danger) 88%, transparent));
            color: #fff;
            border-color: color-mix(in srgb, var(--danger) 58%, white 42%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.72),
                0 10px 22px color-mix(in srgb, var(--danger) 24%, transparent),
                0 3px 7px var(--button-neutral-shadow);
        }

        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            height: 24px;
        }

        .theme-select {
            height: 100%;
            padding: 0 8px;
            line-height: 22px;
            margin: 0;
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--glass-control-bg) 68%, white 32%),
                    color-mix(in srgb, var(--glass-control-bg) 88%, transparent));
            border: 1px solid color-mix(in srgb, var(--accent) 76%, transparent);
            color: var(--accent);
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow:
                inset 0 1px 0 var(--button-highlight),
                0 5px 13px color-mix(in srgb, var(--accent) 9%, transparent),
                0 2px 4px color-mix(in srgb, var(--button-neutral-shadow) 68%, transparent);
            -webkit-backdrop-filter: blur(var(--control-glass-blur)) saturate(170%);
            backdrop-filter: blur(var(--control-glass-blur)) saturate(170%);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .icon-btn {
            cursor: pointer;
            color: var(--text-secondary);
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
            border-radius: 9px;
            border: 1px solid color-mix(in srgb, var(--glass-border) 74%, transparent);
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--glass-control-bg) 66%, white 34%),
                    color-mix(in srgb, var(--glass-control-bg) 84%, transparent));
            box-shadow:
                inset 0 1px 0 var(--button-highlight),
                0 5px 12px color-mix(in srgb, var(--button-neutral-shadow) 72%, transparent);
            -webkit-backdrop-filter: blur(var(--control-glass-blur)) saturate(170%);
            backdrop-filter: blur(var(--control-glass-blur)) saturate(170%);
        }

        .icon-btn:hover {
            color: var(--accent);
            transform: translateY(-1px);
            border-color: color-mix(in srgb, var(--accent) 48%, transparent);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.84),
                0 8px 18px color-mix(in srgb, var(--accent) 16%, transparent),
                0 2px 5px var(--button-neutral-shadow);
        }

        .icon-btn:active {
            transform: translateY(1px) scale(0.96);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.16);
        }

        .lang-btn {
            cursor: pointer;
            font-size: 12px;
            border: 1px solid color-mix(in srgb, var(--accent) 76%, transparent);
            color: var(--accent);
            padding: 0 6px;
            border-radius: 8px;
            height: 24px;
            line-height: 22px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: no-drag;
            background:
                linear-gradient(180deg,
                    color-mix(in srgb, var(--glass-control-bg) 68%, white 32%),
                    color-mix(in srgb, var(--glass-control-bg) 88%, transparent));
            box-shadow:
                inset 0 1px 0 var(--button-highlight),
                0 5px 13px color-mix(in srgb, var(--accent) 9%, transparent),
                0 2px 4px color-mix(in srgb, var(--button-neutral-shadow) 68%, transparent);
            -webkit-backdrop-filter: blur(var(--control-glass-blur)) saturate(170%);
            backdrop-filter: blur(var(--control-glass-blur)) saturate(170%);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .lang-btn:hover,
        .theme-select:hover {
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.88),
                0 8px 18px color-mix(in srgb, var(--accent) 15%, transparent),
                0 2px 5px var(--button-neutral-shadow);
        }

        .toolbar {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }

        /* Shared glass layer for every color theme. */
        .toolbar,
        .card,
        .profile-item,
        .modal-content,
        .timezone-dropdown,
        .ext-item,
        .import-menu-dropdown,
        .help-highlight-card,
        .launch-progress-modal {
            border-color: var(--glass-border);
            box-shadow: var(--glass-shadow);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
        }

        input:not([type="checkbox"]):not([type="radio"]),
        textarea,
        select,
        button.outline,
        .lang-btn,
        .status-badge {
            -webkit-backdrop-filter: blur(14px) saturate(var(--glass-saturation));
            backdrop-filter: blur(14px) saturate(var(--glass-saturation));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        html[data-native-glass="true"] .toolbar,
        html[data-native-glass="true"] .card,
        html[data-native-glass="true"] .profile-item,
        html[data-native-glass="true"] .modal-content,
        html[data-native-glass="true"] .timezone-dropdown,
        html[data-native-glass="true"] .ext-item,
        html[data-native-glass="true"] .import-menu-dropdown,
        html[data-native-glass="true"] .help-highlight-card,
        html[data-native-glass="true"] .launch-progress-modal {
            -webkit-backdrop-filter: blur(calc(var(--glass-blur) * 1.2)) saturate(180%);
            backdrop-filter: blur(calc(var(--glass-blur) * 1.2)) saturate(180%);
        }

        button.outline,
        .lang-btn,
        .status-badge {
            background-color: var(--glass-control-bg);
        }

        .status-badge {
            font-size: 12px;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .sub-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .sub-left {
            display: flex;
            gap: 10px;
        }

        .sub-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 15px;
            width: 220px;
            font-size: 12px;
            margin: 0;
            transition: width 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent);
            outline: none;
            width: 260px;
        }

        .layout {
            display: flex;
            gap: 15px;
            height: calc(100vh - 200px);
        }

        .main-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

            flex-shrink: 0;
            position: relative;

        .profile-drag-shell.drop-after::after {
            content: '';
            position: absolute;
            left: 6px;
            right: 6px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 224, 255, 0.7);

        .main-list.grid-view .profile-drag-shell.drop-after::after {
            top: 6px;
            bottom: 6px;
            width: 2px;
            height: auto;
            left: auto;
            right: auto;
        }

        .profile-drag-shell.drop-before::before {
            top: -5px;
        }

        .profile-drag-shell.drop-after::after {
            bottom: -5px;
        }

        .main-list.grid-view .profile-drag-shell.drop-before::before {
            left: -5px;
        }

        .main-list.grid-view .profile-drag-shell.drop-after::after {

            white-space: nowrap;
            flex-shrink: 0;

        .tab-btn {
            padding: 8px 15px;

        .icon-btn:hover {

        /* Update notification badge */
        .has-update {
            position: relative;
        }

        .has-update::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--card-bg);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: var(--glass-control-bg);
        }

            display: none;
        }

        .help-section.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .export-option {
            padding: 15px;
            border: 1px solid var(--border);

            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;

        .export-option:hover {
            background: var(--surface-hover);

        .export-title {
            font-weight: bold;
            font-size: 14px;
        }

        .export-desc {

            color: var(--text-secondary);
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--splash-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 0, 0.02) 3px);
            transition: opacity 0.5s ease;
        }

        #splash.fade-out {
            opacity: 0;
        }

        .glitch-wrapper {
            position: relative;
        }

        .glitch-text {
            font-size: 120px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0px;
            color: var(--splash-color);
            font-family: 'Arial', sans-serif;
            font-style: italic;
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--splash-bg);
        }

        .glitch-text::before {
            left: -4px;
            text-shadow: 2px 0 #00fff9;
            animation: glitch-anim-1 2.5s infinite reverse steps(2, end);
        }

        .glitch-text::after {
            left: 4px;
            text-shadow: -2px 0 #ff00c1;
            animation: glitch-anim-2 2s infinite reverse steps(2, end);
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(50% 0 30% 0);
                transform: translate(-5px, 0);
            }

            20% {
                clip-path: inset(10% 0 60% 0);
                transform: translate(5px, 0);
            }

            40% {
                clip-path: inset(80% 0 5% 0);
                transform: translate(-5px, 0);
            }

            60% {
                clip-path: inset(10% 0 80% 0);
                transform: translate(5px, 0);
            }

            80% {
                clip-path: inset(40% 0 20% 0);
                transform: translate(-5px, 0);
            }

            100% {
                clip-path: inset(20% 0 50% 0);
                transform: translate(0, 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 10% 0);
                transform: translate(5px, 0);
            }

            30% {
                clip-path: inset(20% 0 60% 0);
                transform: translate(5px, 0);
            }

            60% {
                clip-path: inset(10% 0 80% 0);
                transform: translate(5px, 0);
            }

            90% {
                clip-path: inset(30% 0 40% 0);
                transform: translate(5px, 0);
            }

            100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0, 0);
            }
        }
